name: apk-downloader
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名"
        required: true
        type: string
      architecture:
        description: "架构（arm64-v8a, armeabi-v7a, x86, x86_64）"
        required: false
        default: "arm64-v8a"
        type: string
      version_code:
        description: "版本（默认最新）"
        required: false
        type: string

jobs:
  download-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Initial env
        run: |
          set -euo pipefail
          sudo apt update && sudo apt install -y wget curl build-essential

      - name: Install latest apkeep
        run: |
          set -euo pipefail
          cargo install apkeep
          apkeep --version

      - name: Create directory and download apk
        run: |
          set -euo pipefail
          mkdir -p ./apks
          DOWNLOAD_CMD="apkeep -a ${{ inputs.package_name }} -d apkmirror --architecture ${{ inputs.architecture }} ./apks"
          # 若指定版本号，添加版本参数
          if [ -n "${{ inputs.version_code }}" ]; then
            DOWNLOAD_CMD="${DOWNLOAD_CMD} --version-code ${{ inputs.version_code }}"
          fi
          # 执行下载
          echo "开始下载应用：${{ inputs.package_name }}"
          eval $DOWNLOAD_CMD
          echo "下载完成，文件清单："
          ls -lh ./apks/