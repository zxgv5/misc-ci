name: apk-downloader
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名"
        required: true
        type: string
      architecture:
        description: "架构（arm64-v8a, armeabi-v7a, x86, x86_64）"
        required: false
        default: "arm64-v8a"
        type: string
      version_code:
        description: "版本（默认最新）"
        required: false
        type: string

jobs:
  download-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Initial env
        run: |
          set -euo pipefail
          sudo apt update && sudo apt install -y wget curl build-essential

      - name: Install latest apkeep
        run: |
          set -euo pipefail
          cargo install apkeep
          apkeep --version

      - name: Create directory and download apk
        run: |
          set -euo pipefail
          mkdir -p ./apks
          # 构建应用标识（包名@版本号，版本号可选）
          APP_ID="${{ inputs.package_name }}"
          if [ -n "${{ inputs.version_code }}" ]; then
            APP_ID="${APP_ID}@${{ inputs.version_code }}"
          fi
          # 架构参数
          ARCH="${{ inputs.architecture }}"
          echo "开始下载应用：$APP_ID，架构：$ARCH"
          # 使用 apk-pure 源，通过 --options 指定架构
          apkeep -a "$APP_ID" -d apk-pure --options "arch=$ARCH" ./apks/
          echo "下载完成，文件清单："
          ls -lh ./apks/